services:
  db:
    image: postgres:15-alpine
    container_name: camping_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - camping_pgdata:/var/lib/postgresql/data

volumes:
  camping_pgdata:
